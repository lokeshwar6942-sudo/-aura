<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura - Premium AI Assistant</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <div class="chat-wrapper">
        <div class="chat-container">
            <div class="chat-header">
                <div class="header-info">
                    <div class="avatar">
                        <i class="fa-solid fa-sparkles"></i>
                    </div>
                    <div>
                        <h2>Aura Support</h2>
                        <p class="status"><span class="dot"></span> AI Online</p>
                    </div>
                </div>
                <button class="close-btn"><i class="fa-solid fa-ellipsis-vertical"></i></button>
            </div>
            
            <div class="chat-body" id="chat-body">
                <div class="message assistant-message">
                    <div class="message-content">
                        Hello! I'm <strong>Aura</strong>, your premium AI support assistant. How can I help you today? ✨
                    </div>
                </div>
            </div>
            
            <div class="chat-input-area">
                <input type="text" id="user-input" placeholder="Ask me anything..." autocomplete="off">
                <button id="send-btn"><i class="fa-solid fa-paper-plane"></i></button>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
